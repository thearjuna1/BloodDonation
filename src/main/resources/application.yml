spring:
  datasource:
    url: jdbc:mysql://localhost:3306/Blood_Donation_Db1
    username: root
    password: ArjunBadoni@12
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
       hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  jwt:
    secret: ${JWT_SECRET:c2VjdXJlYmxvb2Rkb25hdGlvbnN5c3RlbWtleXNlY3VyZWJsb29kZG9uYXRpb25zeXN0ZW1rZXk=}
    expiration-ms: 86400000  # 24 hours
  donation:
    min-gap-days: 90
  otp:
    expiry-minutes: 10
  rate-limit:
    max-requests: 5
    window-minutes: 1

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    com.blooddonation: DEBUG
    org.springframework.security: INFO